<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ejercicio 8 - Contador de palabras</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/js_ejercicio_8.js" defer></script>
</head>
<body>
  <main class="page">
    <a class="back-link" href="index.html">Volver al indice</a>

    <section class="card">
      <p class="eyebrow">Ejercicio 8</p>
      <h1>Contador de palabras y caracteres</h1>
      <p>Escribe texto para ver el recuento actualizado en tiempo real.</p>

      <label for="textArea">Texto</label>
      <textarea id="textArea" rows="8" placeholder="Escribe aqui..."></textarea>

      <div class="stats-grid">
        <p class="result" id="wordCount">Palabras: 0</p>
        <p class="result" id="characterCount">Caracteres sin espacios: 0</p>
      </div>
    </section>
  </main>
</body>
</html>
