<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ejercicio 6 - Temporizador</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/js_ejercicio_6.js" defer></script>
</head>
<body>
  <main class="page">
    <a class="back-link" href="index.html">Volver al indice</a>

    <section class="card">
      <p class="eyebrow">Ejercicio 6</p>
      <h1>Temporizador</h1>
      <p>Inicia, pausa y reinicia un contador de tiempo.</p>

      <p class="timer" id="timerDisplay">00:00:00</p>

      <div class="button-group">
        <button class="button" id="startButton">Iniciar</button>
        <button class="button button--secondary" id="pauseButton">Pausar</button>
        <button class="button button--danger" id="resetButton">Reiniciar</button>
      </div>
    </section>
  </main>
</body>
</html>
